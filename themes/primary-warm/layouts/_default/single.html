{{ define "main" }}
<div class="post-header">
    <h1>{{ .Title }}</h1>
    <div class="post-meta">
        {{ if not .Date.IsZero }}
        {{ .Date.Format .Site.Params.dateFormat }}
        {{ end }}
        {{ with .Params.tags }}
        <div class="post-tags">
            {{ range . }}<a class="tag" href="{{ " tags/" | relURL }}{{ . | urlize }}/">{{ . }}</a>{{ end }}
        </div>
        {{ end }}
    </div>
</div>
<article class="post-content">
    {{ .Content }}
</article>
{{ end }}
